<script>
const HASH="48dca0ec213ea0e913a2882e54654c98916332cbfb58815e29c8f12fea2229a1";
const SESSION_KEY="pengakarta_auth";

async function sha256(msg){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function tryLogin(){
  const pw=document.getElementById("pw-input").value;
  const h=await sha256(pw);
  if(h===HASH){
    sessionStorage.setItem(SESSION_KEY,"1");
    unlock();
  } else {
    document.getElementById("pw-error").textContent="❌ Fel lösenord – försök igen!";
    document.getElementById("pw-input").value="";
    document.getElementById("pw-input").focus();
  }
}

function unlock(){
  document.getElementById("login-gate").style.display="none";
  document.getElementById("app-content").style.display="block";
}

// Auto-unlock if already authenticated this session
if(sessionStorage.getItem(SESSION_KEY)==="1") unlock();

// Enter key to submit
document.getElementById("pw-input").addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin();});
</script>

                      </div>
                      <div style={{fontSize:"0.72rem",color:"#7766aa",marginTop:2}}>
                        ≈ V1: {fmt(p.v1d*4.33*747)}/mån · V2: {fmt(p.v2d*4.33*844)}/mån
                      </div>
                      <div style={{fontSize:"0.72rem",color:"#9a80cc",marginTop:4}}>
                        Denna period: V1 ≈ <b style={{color:"#a7f3c0"}}>{pV1days} dagar</b> · V2 ≈ <b style={{color:"#818cf8"}}>{pV2days} dagar</b>
                      </div>
                    </div>
                  );
                })}
              </React.Fragment>}
            </Card>
          );
        })}
      </div>
      );
    })()}

    {/* ── TABELL ── */}
    {tab==="tabell"&&(
      <div className="mob-flex-col" style={{display:"flex",gap:24,flexWrap:"wrap",alignItems:"flex-start"}}>
        <div style={{flex:1,minWidth:0}}>
          <h2 className="mob-section-title" style={{fontFamily:"'Fredoka One',cursive",fontSize:"1.9rem",color:"#f0abfc",marginBottom:6}}>📊 Månadskartan</h2>
          <p style={{color:"#7766aa",fontSize:"0.8rem",marginBottom:18}}>{isMobile?"Tryck på en månad för detaljer 👆":"Håll muspekaren över en månad för detaljer 🔍"}  ·  Siffror i tusental (k)</p>
          <div className="mob-table-wrap" style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
            <table className="mob-table" style={{borderCollapse:"separate",borderSpacing:isMobile?"2px 2px":"4px 4px"}}>
              <thead>
                <tr>
                  <th style={{background:"#160e28",color:"#c084fc",padding:"8px 14px",borderRadius:10,fontFamily:"'Fredoka One',cursive",fontSize:"0.85rem"}}>År</th>
                  {MONTHS.map(mn=><th key={mn} style={{background:"#160e28",color:"#c084fc",padding:"6px 4px",borderRadius:10,fontFamily:"'Fredoka One',cursive",fontSize:"0.78rem",textAlign:"center",minWidth:62}}>{mn}</th>)}
                </tr>
              </thead>
              <tbody>
                {Object.keys(byYear).sort().filter(yr=>+yr>=2026&&+yr<=2030).map(yr=>(
                  <tr key={yr}>
                    <td style={{background:"#160e28",color:"#f0abfc",padding:"8px 14px",borderRadius:10,fontFamily:"'Fredoka One',cursive",fontSize:"0.9rem",textAlign:"center",whiteSpace:"nowrap"}}>{yr}</td>
                    {byYear[yr].map(cell=>{
                      const md=mood(cell.tot);
                      const hasFlags=cell.flags&&cell.flags.length>0;
                      return(
                        <td key={cell.month} style={{padding:0}}>
                          <div className="cell"
                            onClick={()=>isMobile&&setTapped(tapped&&tapped.mi===cell.mi?null:cell)}
                            onMouseEnter={e=>!isMobile&&onEnt(cell,e)} onMouseLeave={()=>!isMobile&&onLv()}
                            style={{background:md.bg,border:hasFlags?"2px solid #f0abfc":"2px solid "+md.border,borderRadius:12,padding:"5px 3px",textAlign:"center",cursor:"pointer",transition:"transform 0.15s, box-shadow 0.15s",minWidth:60,position:"relative"}}>
                            {hasFlags&&<div style={{position:"absolute",top:-4,right:-4,background:"#c084fc",borderRadius:"50%",width:14,height:14,fontSize:"0.5rem",lineHeight:"14px",color:"#fff",fontWeight:900,boxShadow:"0 0 6px #c084fc"}}>{cell.flags.length}</div>}
                            <div style={{fontSize:"1.1rem",lineHeight:1}}>{md.emoji}</div>
                            <div style={{color:md.text,fontWeight:900,fontSize:"0.72rem",marginTop:2}}>{Math.round(cell.tot/1000)}k</div>
                            <div style={{color:md.text,opacity:0.65,fontSize:"0.58rem"}}>{Math.round(cell.v1f/1000)}·{Math.round(cell.v2f/1000)}</div>
                            {hasFlags&&<div style={{fontSize:"0.55rem",marginTop:1,lineHeight:1}}>{cell.flags.map((f,i)=><span key={i}>{f.icon}</span>)}</div>}
                          </div>
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{marginTop:14,display:"flex",gap:isMobile?6:12,flexWrap:"wrap",fontSize:"0.74rem"}}>
            {MOODS.map(m=><span key={m.emoji} style={{color:m.text,background:m.bg,border:"1px solid "+m.border,borderRadius:8,padding:"3px 10px"}}>{m.emoji} {isMobile?"":m.label}</span>)}
          </div>
          <div style={{marginTop:8,fontSize:"0.66rem",color:"#443366"}}>Totalt / V1 · V2</div>
        </div>

        {/* SIDOPANEL */}
        <div className="mob-sidepanel" style={{width:210,flexShrink:0}}>
          <div style={{fontFamily:"'Fredoka One',cursive",color:"#fbbf24",fontSize:"1rem",marginBottom:12}}>🔒 Sidoposter</div>
          {[{title:"Lön (efter skatt)",color:"#7bb3e0",rows:[lon1.length>0&&["V1 Heltid",lon1Heltid.toLocaleString("sv-SE")+" kr"],lon2.length>0&&["V2 Heltid",lon2Heltid.toLocaleString("sv-SE")+" kr"]].filter(Boolean)},
            {title:"Pension/mån",color:"#c084fc",rows:[lon1.length>0&&["V1 Statlig","7 519 kr"],lon1.length>0&&["V1 Tjänste","1 967 kr"],lon2.length>0&&["V2 Statlig","8 620 kr"],lon2.length>0&&["V2 Tjänste","2 886 kr"]].filter(Boolean)}
          ].map(({title,color,rows})=>(
            <div key={title} style={{background:"#0e0d1e",border:"2px solid #1e1840",borderRadius:14,padding:"12px 14px",marginBottom:12}}>
              <div style={{color:color,fontFamily:"'Fredoka One',cursive",fontSize:"0.88rem",marginBottom:8}}>{title}</div>
              {rows.length===0&&<div style={{color:"#333",fontSize:"0.72rem"}}>Inget aktiverat</div>}
              {rows.map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:"0.72rem",marginBottom:4}}><span style={{color:"#6655aa"}}>{k}</span><span style={{color:color}}>{v}</span></div>)}
            </div>
          ))}
          {data[0]&&(
            <div style={{background:"#0e0d1e",border:"2px solid #fbbf2444",borderRadius:14,padding:"12px 14px"}}>
              <div style={{color:"#fbbf24",fontFamily:"'Fredoka One',cursive",fontSize:"0.88rem",marginBottom:8}}>📍 Jan 2026</div>
              {[["💼 V1 inkomst",data[0].v1i,"#a7f3c0"],["💼 V2 inkomst",data[0].v2i,"#a7f3c0"],["🏠 Delade kostn.",data[0].sh,"#fca5a5"],["🎯 V1 kvar",data[0].v1f,data[0].v1f>=0?"#a7f3c0":"#fca5a5"],["🎯 V2 kvar",data[0].v2f,data[0].v2f>=0?"#a7f3c0":"#fca5a5"]].map(([k,v,c])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:"0.7rem",marginBottom:4}}><span style={{color:"#6655aa"}}>{k}</span><span style={{color:c}}>{fmt(v)}</span></div>
              ))}
            </div>
          )}
        </div>
      </div>
    )}

    </div>

    {/* DETAIL VIEW — desktop tooltip (hover) or mobile bottom sheet (tap) */}
    {(()=>{
      const cell=isMobile?tapped:hover;
      if(!cell)return null;
      const content=(
        <React.Fragment>
          <div style={{fontFamily:"'Fredoka One',cursive",fontSize:"1.15rem",color:"#f0abfc",marginBottom:10,borderBottom:"1px solid #2a1a4a",paddingBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>{mood(cell.tot).emoji} {MONTHS[cell.month-1]} {cell.year}</span>
            {isMobile&&<button onClick={()=>setTapped(null)} style={{background:"#ffffff10",border:"none",color:"#c084fc",borderRadius:8,padding:"4px 12px",cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontSize:"0.82rem"}}>✕</button>}
          </div>

          {cell.flags&&cell.flags.length>0&&<div style={{background:"#1a1040",border:"1px solid #c084fc44",borderRadius:10,padding:"8px 10px",marginBottom:10}}>
            <div style={{fontSize:"0.68rem",color:"#f0abfc",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>📌 Händelser</div>
            {cell.flags.map((f,i)=>(
              <div key={i} style={{fontSize:"0.76rem",color:"#e0cfff",marginBottom:2}}>
                {f.icon} {f.text}
              </div>
            ))}
          </div>}

          {Object.keys(cell.gi).length>0&&<React.Fragment>
            <div style={{fontSize:"0.68rem",color:"#6655aa",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Inkomster</div>
            {Object.entries(cell.gi).map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",gap:14,marginBottom:4}}>
                <span style={{color:"#c4b5fd"}}>{k}</span>
                <span style={{fontWeight:700,color:"#a7f3c0",whiteSpace:"nowrap"}}>+{fmt(v)}</span>
              </div>
            ))}
            <div style={{display:"flex",justifyContent:"space-between",gap:14,marginBottom:8,borderBottom:"1px solid #1e1840",paddingBottom:6,marginTop:2}}>
              <span style={{color:"#9980cc",fontStyle:"italic"}}>Summa inkomster</span>
              <span style={{fontWeight:700,color:"#a7f3c0",whiteSpace:"nowrap"}}>+{fmt(cell.v1i+cell.v2i)}</span>
            </div>
          </React.Fragment>}

          {(()=>{
            const allCosts={};
            Object.entries(cell.gc1).forEach(([k,v])=>{allCosts[k]=(allCosts[k]||0)+v;});
            Object.entries(cell.gc2).forEach(([k,v])=>{allCosts[k]=(allCosts[k]||0)+v;});
            Object.entries(cell.gsh).forEach(([k,v])=>{allCosts[k]=(allCosts[k]||0)+v;});
            const entries=Object.entries(allCosts);
            if(entries.length===0)return null;
            const totalCost=cell.v1c+cell.v2c+cell.sh;
            return(<React.Fragment>
              <div style={{fontSize:"0.68rem",color:"#6655aa",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>
                Utgifter ({Math.round(cell.v1share*100)}% V1 / {Math.round(cell.v2share*100)}% V2)
              </div>
              {entries.map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",gap:14,marginBottom:4}}>
                  <span style={{color:"#f9a8d4"}}>{k}</span>
                  <span style={{fontWeight:700,color:"#fca5a5",whiteSpace:"nowrap"}}>–{fmt(v)}</span>
                </div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",gap:14,marginBottom:4,borderTop:"1px solid #1e1840",paddingTop:6,marginTop:2}}>
                <span style={{color:"#9980cc",fontStyle:"italic"}}>Summa utgifter</span>
                <span style={{fontWeight:700,color:"#fca5a5",whiteSpace:"nowrap"}}>–{fmt(totalCost)}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",gap:14,marginBottom:8,borderBottom:"1px solid #1e1840",paddingBottom:6}}>
                <span style={{color:"#9980cc",fontStyle:"italic"}}>V1 betalar / V2 betalar</span>
                <span style={{fontWeight:700,color:"#fca5a5",whiteSpace:"nowrap"}}>–{fmt(cell.v1c+cell.sh*cell.v1share)} / –{fmt(cell.v2c+cell.sh*cell.v2share)}</span>
              </div>
            </React.Fragment>);
          })()}

          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{color:"#9980cc"}}>👩 V1 kvar</span>
              <span style={{fontWeight:700,color:cell.v1f>=0?"#a7f3c0":"#fca5a5"}}>{fmt(cell.v1f)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{color:"#9980cc"}}>👨 V2 kvar</span>
              <span style={{fontWeight:700,color:cell.v2f>=0?"#a7f3c0":"#fca5a5"}}>{fmt(cell.v2f)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",background:"#ffffff0a",borderRadius:10,padding:"7px 10px",marginTop:4}}>
              <span style={{color:"#f0abfc",fontFamily:"'Fredoka One',cursive"}}>Totalt kvar</span>
              <span style={{color:cell.tot>=0?"#a7f3c0":"#fca5a5",fontFamily:"'Fredoka One',cursive",fontSize:"1.05rem"}}>{fmt(cell.tot)}</span>
            </div>
          </div>
        </React.Fragment>
      );

      if(isMobile){
        return(<React.Fragment>
          <div className="mob-bottom-sheet-overlay" onClick={()=>setTapped(null)}/>
          <div className="mob-bottom-sheet" style={{fontFamily:"'Nunito',sans-serif",fontSize:"0.82rem"}}>{content}</div>
        </React.Fragment>);
      }
      return(
        <div style={{position:"fixed",left:Math.min(ttxy.x+16,window.innerWidth-340),top:Math.min(ttxy.y-10,window.innerHeight-400),background:"linear-gradient(135deg,#180e2e,#0e0d20)",border:"2px solid #c084fc99",borderRadius:18,padding:"16px 20px",maxWidth:320,zIndex:9999,pointerEvents:"none",boxShadow:"0 8px 40px #c084fc55",fontFamily:"'Nunito',sans-serif",fontSize:"0.78rem",animation:"pop 0.15s ease"}}>
          {content}
        </div>
      );
    })()}

    </React.Fragment>}
  </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
